name: Build and push Docker image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    name: Build and push develop and release image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ -z "$VERSION" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push develop and package-version tags
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            noplexzone/limitlist:develop
            noplexzone/limitlist:v${{ steps.package.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
