name: Build and push Docker image

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    name: Build and push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ -z "$VERSION" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Select image tags
        id: image-tags
        shell: bash
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/master" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            TAGS='noplexzone/limitlist:develop'
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            if [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
              echo "Git tag $GITHUB_REF_NAME does not match package version v$VERSION" >&2
              exit 1
            fi
            TAGS="noplexzone/limitlist:v$VERSION"
          else
            echo "Unsupported publish ref: $GITHUB_REF" >&2
            exit 1
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
