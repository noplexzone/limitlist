version: '3.8'

services:
  anime-tracker:
    image: anime-tracker:v1.0.0
    build: .
    container_name: anime-tracker
    ports:
      - "3020:3000"
    volumes:
      - /mnt/user/appdata/anime-tracker:/data
    environment:
      DATABASE_URL: file:/data/anime-tracker.db
      AUTH_USERNAME: ${AUTH_USERNAME:?set AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    labels:
      project: anime-tracker
      managed-by: jarvis
      net.unraid.docker.webui: http://[IP]:[PORT:3000]/
      net.unraid.docker.icon: https://raw.githubusercontent.com/NX211/homer-icons/master/png/myanimelist.png
      net.unraid.docker.description: Personal anime watchlist, stats dashboard, airing schedule, and in-app reminders.
    restart: unless-stopped
