version: '3.8'

services:
  limitlist:
    image: noplexzone/limitlist:v1.2.0-rc.5
    build: .
    container_name: limitlist
    ports:
      - "3020:3000"
    volumes:
      - /mnt/user/appdata/limitlist:/data
    environment:
      DATABASE_URL: file:/data/limitlist.db
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    labels:
      project: limitlist
      managed-by: jarvis
      net.unraid.docker.webui: http://[IP]:[PORT:3000]/
      net.unraid.docker.icon: https://raw.githubusercontent.com/NX211/homer-icons/master/png/myanimelist.png
      net.unraid.docker.description: Personal anime watchlist, stats dashboard, dashboard airing calendar, and in-app reminders.
    restart: unless-stopped
